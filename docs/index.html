<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexoraCSS Documentation</title>
    
    <!-- External Engines -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <style>
        :root {
            --rtd-sidebar-bg: #343131;
            --rtd-sidebar-dark: #232121;
            --rtd-primary: #e67e22; /* RTD Orange */
            --rtd-link: #2980b9;
            --sidebar-width: 300px;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; background: #fcfcfc; color: #404040; }
        
        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width); background: var(--rtd-sidebar-bg);
            height: 100vh; position: fixed; color: #ccc; display: flex; flex-direction: column;
        }
        .sidebar-header { background: var(--rtd-sidebar-dark); padding: 20px; text-align: center; }
        .sidebar-header a { color: white; font-weight: 700; text-decoration: none; font-size: 1.2rem; }
        
        .sidebar-nav { list-style: none; padding: 0; margin: 0; }
        .nav-title { padding: 10px 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #555; background: #efefef; }
        .nav-link { 
            display: block; padding: 10px 20px; color: #d9d9d9; text-decoration: none; 
            font-size: 0.9rem; border-bottom: 1px solid rgba(0,0,0,0.1); cursor: pointer;
        }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-link.active { background: #444; color: white; border-left: 4px solid var(--rtd-primary); }

        /* --- CONTENT --- */
        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 20px 40px; max-width: 900px; }
        .breadcrumbs { font-size: 0.85rem; color: #999; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        #content h1 { color: var(--rtd-link); border-bottom: 1px solid #eee; padding-bottom: 10px; }
        #content h2 { margin-top: 30px; border-bottom: 1px solid #eee; }
        #content table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        #content th, #content td { border: 1px solid #e1e4e5; padding: 10px; }
        #content th { background: #f3f6f6; }

        /* Admonitions */
        .admonition { background: #e7f3fe; border-left: 6px solid #2196F3; padding: 15px; margin: 20px 0; border-radius: 4px; }
        .admonition-title { font-weight: 800; color: #2196F3; font-size: 0.8rem; text-transform: uppercase; }

        pre { background: #f8f8f8 !important; border: 1px solid #e1e4e5 !important; padding: 15px !important; border-radius: 4px; }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="#">FlexoraCSS</a>
            <div style="font-size: 0.7rem; opacity: 0.5;">v1.0.4</div>
        </div>
        <nav id="sidebar-nav">
            <!-- নেভিগেশন অটোমেটিক তৈরি হবে -->
        </nav>
    </aside>

    <main class="main-content">
        <nav class="breadcrumbs"> Docs » <span id="cat">Docs</span> » <b id="pg">Page</b></nav>
        <div id="content"></div>
        <footer style="margin-top: 50px; font-size: 0.8rem; color: #999; border-top: 1px solid #eee; padding-top: 20px;">
            © Copyright 2024, Flexora Team.
        </footer>
    </main>

    <script>
        /* 
           =========================================
           এখানে আপনার Markdown লিখুন (Backticks ` ` এর ভেতরে)
           নতুন পেজ যোগ করতে চাইলে শুধু একটি নতুন কী (key) যোগ করুন।
           =========================================
        */
        const pages = {
            "introduction": {
                title: "Introduction",
                category: "Getting Started",
                content: `
# Introduction to FlexoraCSS
Flexora is a modern, utility-first CSS framework.

::: note
This documentation is built with a Single-File Engine to work perfectly on Vercel.
:::

## Features
- **Fast:** Only 12kb gzipped.
- **Modern:** Built with CSS Variables.
- **Reliable:** Zero configuration needed.

| Feature | Support |
| :--- | :--- |
| Flexbox | ✅ |
| Grid | ✅ |
| Dark Mode | ✅ |
                `
            },
            "installation": {
                title: "Installation",
                category: "Getting Started",
                content: `
# Installation Guide
Install FlexoraCSS via NPM or CDN.

### Via NPM
\`\`\`bash
npm install flexoracss
\`\`\`

### Via CDN
\`\`\`html
<link rel="stylesheet" href="https://cdn.flexora.com/fx.css">
\`\`\`
                `
            },
            "buttons": {
                title: "Buttons",
                category: "Components",
                content: `
# Buttons
Use the \`.fx-btn\` class to create beautiful buttons.

\`\`\`html
<button class="fx-btn">Click Me</button>
\`\`\`

## Variants
- Primary: \`.fx-btn-primary\`
- Outline: \`.fx-btn-outline\`
                `
            }
        };

        // --- ENGINE LOGIC ---
        const contentDiv = document.getElementById('content');
        const sidebarNav = document.getElementById('sidebar-nav');

        function renderSidebar() {
            let html = '';
            let currentCat = '';
            
            for (let id in pages) {
                if (pages[id].category !== currentCat) {
                    currentCat = pages[id].category;
                    html += `<div class="nav-title">${currentCat}</div>`;
                }
                html += `<a class="nav-link" onclick="loadPage('${id}')" id="link-${id}">${pages[id].title}</a>`;
            }
            sidebarNav.innerHTML = html;
        }

        function loadPage(id) {
            const page = pages[id];
            
            // Convert ::: admonition ::: to RTD Style
            let text = page.content.replace(/::: (\w+)\n([\s\S]*?)\n:::/g, (match, type, content) => {
                return `<div class="admonition"><div class="admonition-title">${type}</div>${marked.parse(content)}</div>`;
            });

            contentDiv.innerHTML = marked.parse(text);
            Prism.highlightAll();

            // UI Update
            document.getElementById('pg').innerText = page.title;
            document.getElementById('cat').innerText = page.category;
            window.location.hash = id;

            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('link-' + id).classList.add('active');
        }

        // Run
        renderSidebar();
        const initialPage = window.location.hash.replace('#', '') || 'introduction';
        loadPage(initialPage);

    </script>
</body>
    </html>
