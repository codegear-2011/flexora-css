<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexoraCSS — Premium Documentation</title>
    
    <!-- External Assets -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <style>
        :root {
            --fx-primary: #2563eb;
            --fx-primary-soft: #eff6ff;
            --fx-bg: #ffffff;
            --fx-sidebar: #f8fafc;
            --fx-text-main: #0f172a;
            --fx-text-muted: #64748b;
            --fx-border: #e2e8f0;
            --sidebar-w: 280px;
            --toc-w: 220px;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; margin: 0; background: var(--fx-bg); 
            color: var(--fx-text-main); -webkit-font-smoothing: antialiased;
        }

        /* --- SIDEBAR (Premium Glass) --- */
        .sidebar {
            width: var(--sidebar-w); height: 100vh; position: fixed;
            background: var(--fx-sidebar); border-right: 1px solid var(--fx-border);
            display: flex; flex-direction: column; z-index: 100;
        }
        .sidebar-header { padding: 24px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--fx-border); }
        .logo-sq { width: 32px; height: 32px; background: var(--fx-primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; }
        
        .search-area { padding: 15px 20px; }
        .search-mock { 
            background: white; border: 1px solid var(--fx-border); border-radius: 8px;
            padding: 8px 12px; font-size: 0.85rem; color: var(--fx-text-muted);
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }

        .nav-container { flex: 1; overflow-y: auto; padding: 10px 0; }
        .nav-label { padding: 20px 24px 8px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--fx-text-muted); }
        .nav-link { 
            display: flex; align-items: center; gap: 10px; padding: 8px 24px;
            color: var(--fx-text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500;
            transition: 0.2s; cursor: pointer;
        }
        .nav-link:hover { background: var(--fx-primary-soft); color: var(--fx-primary); }
        .nav-link.active { background: var(--fx-primary-soft); color: var(--fx-primary); font-weight: 600; border-right: 3px solid var(--fx-primary); }

        /* --- CONTENT AREA --- */
        .main-content { margin-left: var(--sidebar-w); margin-right: var(--toc-w); padding: 40px 60px; max-width: 900px; min-height: 100vh; }
        
        .breadcrumbs { font-size: 0.85rem; color: var(--fx-text-muted); margin-bottom: 40px; display: flex; align-items: center; gap: 8px; }
        .breadcrumbs span { color: var(--fx-text-main); font-weight: 600; }

        /* Markdown Styling */
        #content h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 24px; color: var(--fx-text-main); }
        #content h2 { font-size: 1.8rem; font-weight: 700; margin-top: 48px; border-bottom: 1px solid var(--fx-border); padding-bottom: 12px; }
        #content p { font-size: 1.1rem; line-height: 1.75; color: #334155; }
        
        /* Admonitions (Note/Warning) */
        .admonition { 
            margin: 32px 0; padding: 20px; border-radius: 12px; border-left: 5px solid var(--fx-primary);
            background: var(--fx-primary-soft); color: #1e40af;
        }
        .admonition-title { font-weight: 800; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

        /* Code Blocks */
        pre { 
            background: #0f172a !important; padding: 20px !important; border-radius: 12px !important; 
            margin: 24px 0 !important; position: relative;
        }
        .copy-btn {
            position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; padding: 4px 8px;
            border-radius: 6px; font-size: 0.7rem; cursor: pointer; transition: 0.2s;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.2); color: white; }

        /* Right TOC */
        .toc { position: fixed; top: 0; right: 0; width: var(--toc-w); height: 100vh; padding: 40px 20px; border-left: 1px solid var(--fx-border); font-size: 0.85rem; }
        .toc-title { font-weight: 700; margin-bottom: 16px; font-size: 0.75rem; text-transform: uppercase; color: var(--fx-text-muted); }
        .toc-link { display: block; padding: 4px 0; color: var(--fx-text-muted); text-decoration: none; transition: 0.2s; }
        .toc-link:hover { color: var(--fx-primary); }

        @media (max-width: 1100px) { .toc { display: none; } .main-content { margin-right: 0; } }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; padding: 30px; } }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-sq">F</div>
            <span style="font-weight: 800; font-size: 1.2rem; letter-spacing: -0.02em;">Flexora<span style="color:var(--fx-primary)">CSS</span></span>
        </div>
        
        <div class="search-area">
            <div class="search-mock">
                <span>Quick search...</span>
                <span style="font-size: 0.7rem; background: var(--fx-border); padding: 2px 6px; border-radius: 4px;">⌘K</span>
            </div>
        </div>

        <nav class="nav-container" id="sidebar-nav"></nav>

        <div style="padding: 20px; font-size: 0.75rem; color: var(--fx-text-muted); border-top: 1px solid var(--fx-border);">
            <div style="display:flex; justify-content: space-between; align-items: center; cursor: pointer;">
                <span>v1.0.4 (Latest)</span>
                <i data-lucide="chevron-up" style="width:14px"></i>
            </div>
        </div>
    </aside>

    <!-- CONTENT -->
    <main class="main-content">
        <nav class="breadcrumbs">
            Docs <i data-lucide="chevron-right" style="width:14px"></i> 
            <span id="bc-cat">Getting Started</span> <i data-lucide="chevron-right" style="width:14px"></i> 
            <span id="bc-page">Introduction</span>
        </nav>

        <div id="content"></div>

        <footer style="margin-top: 80px; padding-top: 40px; border-top: 1px solid var(--fx-border); display: flex; justify-content: space-between; align-items: center; color: var(--fx-text-muted); font-size: 0.9rem;">
            <span>© 2024 Flexora Team.</span>
            <div style="display:flex; gap: 20px;">
                <a href="#" style="color:inherit; text-decoration:none;">GitHub</a>
                <a href="#" style="color:inherit; text-decoration:none;">Twitter</a>
            </div>
        </footer>
    </main>

    <!-- RIGHT TOC -->
    <aside class="toc">
        <div class="toc-title">On this page</div>
        <div id="toc-links"></div>
    </aside>

    <script>
        // ==========================================
        // আপনার কন্টেন্ট এখানে লিখুন
        // ==========================================
        const documentation = {
            "intro": {
                title: "Introduction",
                category: "Getting Started",
                icon: "info",
                content: `
# Craft premium UIs in record time.
FlexoraCSS is a utility-first framework that prioritizes design quality and developer speed.

::: note
Flexora is currently in Public Beta. We would love to hear your feedback on our GitHub repository.
:::

## Core Philosophy
Unlike other frameworks, Flexora focuses on **meaningful defaults**. You shouldn't have to write dozens of classes just to make a button look high-end.

- **Variables First:** 100% powered by CSS Custom Properties.
- **Micro-interactions:** Built-in smooth hover and active states.
- **Lightweight:** Zero dependencies, < 12kb gzipped.

## Why Flexora?
If you're tired of "Bootstrap-looking" sites but find Tailwind too verbose, Flexora is the perfect middle ground.
                `
            },
            "install": {
                title: "Installation",
                category: "Getting Started",
                icon: "download",
                content: `
# Installation Guide
Get FlexoraCSS running in your project in under 60 seconds.

### Package Manager
The recommended way to use Flexora is via NPM.

\`\`\`bash
npm install flexoracss@latest
\`\`\`

### CDN Link
For quick prototyping, drop this into your header:

\`\`\`html
<link rel="stylesheet" href="https://cdn.flexora.com/fx.css">
\`\`\`

::: warning
When using the CDN, ensure you are using a specific version number in production to avoid breaking changes.
:::
                `
            },
            "buttons": {
                title: "Buttons",
                category: "Components",
                icon: "mouse-pointer-2",
                content: `
# Interactive Buttons
Buttons are the primary way users interact with your application.

## Primary Button
The main action on a page.

\`\`\`html
<button class="fx-btn">Get Started</button>
\`\`\`

## Variants
Flexora supports several semantic variants out of the box:
- \`.fx-btn-outline\`
- \`.fx-btn-ghost\`
- \`.fx-btn-danger\`
                `
            }
        };

        // --- ENGINE LOGIC ---
        const contentDiv = document.getElementById('content');
        const sidebarNav = document.getElementById('sidebar-nav');
        const tocLinks = document.getElementById('toc-links');

        function init() {
            renderSidebar();
            const startPage = window.location.hash.replace('#', '') || 'intro';
            loadPage(startPage);
            lucide.createIcons();
        }

        function renderSidebar() {
            let navHtml = '';
            let currentCat = '';
            
            for (let id in documentation) {
                const item = documentation[id];
                if (item.category !== currentCat) {
                    currentCat = item.category;
                    navHtml += `<div class="nav-label">${currentCat}</div>`;
                }
                navHtml += `
                    <a class="nav-link" id="link-${id}" onclick="loadPage('${id}')">
                        <i data-lucide="${item.icon}" style="width:18px"></i>
                        ${item.title}
                    </a>`;
            }
            sidebarNav.innerHTML = navHtml;
        }

        function loadPage(id) {
            const page = documentation[id];
            if (!page) return;

            // Markdown Parse & Admonition regex
            let rawMd = page.content.replace(/::: (\w+)\n([\s\S]*?)\n:::/g, (match, type, inner) => {
                const icon = type === 'note' ? 'info' : 'alert-triangle';
                return `<div class="admonition admonition-${type}">
                    <div class="admonition-title"><i data-lucide="${icon}" style="width:14px"></i>${type}</div>
                    ${marked.parse(inner)}
                </div>`;
            });

            contentDiv.innerHTML = marked.parse(rawMd);
            
            // Syntax Highlighting
            document.querySelectorAll('pre code').forEach((el) => {
                Prism.highlightElement(el);
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.innerText = 'Copy';
                btn.onclick = () => {
                    navigator.clipboard.writeText(el.innerText);
                    btn.innerText = 'Copied!';
                    setTimeout(() => btn.innerText = 'Copy', 2000);
                };
                el.parentElement.appendChild(btn);
            });

            // Breadcrumbs & Title
            document.getElementById('bc-cat').innerText = page.category;
            document.getElementById('bc-page').innerText = page.title;
            document.title = `${page.title} — FlexoraCSS Docs`;
            window.location.hash = id;

            // Sidebar active state
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('link-' + id).classList.add('active');

            generateTOC();
            lucide.createIcons();
            window.scrollTo(0,0);
        }

        function generateTOC() {
            const hs = contentDiv.querySelectorAll('h2');
            let tocHtml = '';
            hs.forEach((h, i) => {
                const id = 'heading-' + i;
                h.id = id;
                tocHtml += `<a href="#${id}" class="toc-link">${h.innerText}</a>`;
            });
            tocLinks.innerHTML = tocHtml || '<span style="color:var(--fx-text-muted)">No subheadings</span>';
        }

        init();
    </script>
</body>
                </html>
